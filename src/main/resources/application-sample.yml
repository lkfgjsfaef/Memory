spring:
  application:
    name: memory
  datasource:
    url: jdbc:mysql://localhost:3306/memory_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: "your_db_password"
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8081

logging:
  level:
    com.niit: DEBUG

app:
  jwt:
    secret: "your_jwt_secret_key_change_me"
    expiration: 604800000
  qiniu:
    access-key: your_qiniu_access_key
    secret-key: your_qiniu_secret_key
    bucket: your_qiniu_bucket
    domain: http://your-cdn-domain.com
    upload-url: https://upload-as0.qiniup.com
    token-expires: 1800
  upload:
    path: ./uploads
